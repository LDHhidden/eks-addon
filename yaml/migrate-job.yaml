apiVersion: batch/v1
kind: Job
metadata:
  name: test-web-migrate
  namespace: test-web
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: 730335535410.dkr.ecr.ap-northeast-2.amazonaws.com/test_web:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - >
              python manage.py migrate
          env:
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: django-secret
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: django-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: django-secret
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: django-secret
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: django-secret
                  key: DB_PORT
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: django-secret
                  key: DJANGO_SECRET_KEY
            - name: DJANGO_DEBUG
              valueFrom:
                secretKeyRef:
                  name: django-secret
                  key: DJANGO_DEBUG
            - name: DJANGO_ALLOWED_HOSTS
              valueFrom:
                secretKeyRef:
                  name: django-secret
                  key: DJANGO_ALLOWED_HOSTS